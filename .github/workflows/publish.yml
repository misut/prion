name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish-testpypi:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/prion
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: uv build
      - run: uv publish --publish-url https://test.pypi.org/legacy/ --trusted-publishing always

  publish-pypi:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/prion
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: uv build
      - run: uv publish --trusted-publishing always
